# Smap subscriber log configuration
# This file is checked every 30 seconds - changes apply without restart.
# Deploy to: {basePath}/settings/smap-logging.properties  (e.g. /smap/settings/)

# Log level
# SEVERE  - errors and exceptions only
# WARNING - unexpected conditions
# INFO    - key events per submission (start, outcome); worker start/stop  [default]
# FINE    - verbose detail (SQL statements, per-table writes, intermediate steps)
smap.log.level=INFO

# Output format
# text - human-readable plain text  [default]
# json - JSON lines, one object per log entry (for centralised log ingestion)
smap.log.format=text
